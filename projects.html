<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Projects — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="app.js"></script>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// Things I've Built</div>
    <h1 class="section-title fade-in">Projects</h1>
    <div id="projGrid" class="projects-grid"></div>
    <div id="emptyState" style="text-align:center;padding:80px 0;display:none">
      <div style="font-size:3rem;margin-bottom:16px"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--muted);letter-spacing:2px">Projects coming soon...</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:8px">Add via Admin Panel</div>
    </div>
  </section>
</div>
<div id="_toast" class="toast"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('projects').then(function(d) {
    var list = (d && d.list) ? d.list : [];
    if (!list.length) { document.getElementById('emptyState').style.display='block'; return; }
    document.getElementById('projGrid').innerHTML = list.map(function(p) {
      return '<div class="project-card fade-in">'
        + (p.imageURL ? '<img src="'+p.imageURL+'" style="width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:8px" alt="'+p.title+'">' : '')
        + '<div class="project-card-title">'+p.title+'</div>'
        + '<div class="project-card-desc">'+p.description+'</div>'
        + '<div class="project-card-tags">'+(p.tags||[]).map(function(t){return '<span class="project-tag">'+t+'</span>';}).join('')+'</div>'
        + (p.link ? '<a href="'+p.link+'" target="_blank" class="btn btn-outline" style="font-size:.72rem;padding:8px 16px;margin-top:4px">View →</a>' : '')
        + '</div>';
    }).join('');
    reObserve();
  });
});
</script>
</body>
</html>
