<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Skills — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<style>
.cat-label{font-family:var(--font-mono);font-size:.72rem;color:var(--accent3);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:block}
.skill-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 22px;display:flex;align-items:center;gap:16px;transition:all .3s;margin-bottom:10px}
.skill-row:hover{border-color:var(--accent);transform:translateX(4px)}
.s-icon{width:42px;height:42px;background:var(--bg);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.s-icon img{width:28px;height:28px;object-fit:contain}
.s-bar{width:100px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.s-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;width:0;transition:width 1.2s ease}
.s-level{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);white-space:nowrap;min-width:80px;text-align:right}
@media(max-width:500px){.s-bar,.s-level{display:none}}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// What I Know</div>
    <h1 class="section-title fade-in">Skills</h1>
    <div id="skillsOut"></div>
  </section>
</div>
<div id="_toast" class="toast"></div>
<script>
// Default skills shown before Firebase loads
var DEFAULT_SKILLS = [
  {name:'C',           category:'Programming Languages', level:'Learning',    pct:45, icon:''},
  {name:'C++',         category:'Programming Languages', level:'Learning',    pct:45, icon:''},
  {name:'Python',      category:'Programming Languages', level:'Comfortable', pct:60, icon:''},
  {name:'NumPy',       category:'Libraries & Tools',     level:'Familiar',    pct:50, icon:''},
  {name:'Matplotlib',  category:'Libraries & Tools',     level:'Familiar',    pct:50, icon:''},
  {name:'Problem Solving', category:'Other',             level:'Strong',      pct:75, icon:''},
  {name:'Scout Leadership',category:'Other',             level:'Experienced', pct:80, icon:''}
];

// Auto logo map - official devicon SVGs
var LOGOS = {
  'c':            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg',
  'c++':          'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg',
  'python':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg',
  'numpy':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/numpy/numpy-original.svg',
  'matplotlib':   'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/matplotlib/matplotlib-original.svg',
  'pandas':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/pandas/pandas-original.svg',
  'git':          'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg',
  'github':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg',
  'html':         'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg',
  'html5':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg',
  'css':          'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
  'css3':         'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
  'javascript':   'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg',
  'js':           'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg',
  'java':         'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg',
  'react':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg',
  'mysql':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg',
  'linux':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg',
  'vscode':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg',
  'matlab':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/matlab/matlab-original.svg',
  'r':            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/r/r-original.svg',
  'docker':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg',
  'figma':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg',
};

function getLogoHTML(name, customIcon) {
  if (customIcon) return '<img src="'+customIcon+'" style="width:28px;height:28px;object-fit:contain"/>';
  var key = name.toLowerCase().replace(/[^a-z0-9+#]/g,'');
  var url = LOGOS[key];
  if (url) return '<img src="'+url+'" style="width:28px;height:28px;object-fit:contain" onerror="this.parentNode.innerHTML=\'<span style=font-family:monospace;font-size:.6rem;color:var(--muted)>\'+\''+name.slice(0,3)+'\'+\'</span>\'"/>';
  return '<span style="font-family:var(--font-mono);font-size:.6rem;color:var(--muted);letter-spacing:0">'+name.slice(0,3)+'</span>';
}

function renderSkills(list) {
  // Group by category
  var groups = {};
  list.forEach(function(s) {
    var cat = s.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });

  var html = '';
  Object.keys(groups).forEach(function(cat) {
    html += '<div style="margin-bottom:48px" class="fade-in">';
    html += '<span class="cat-label">'+cat+'</span>';
    groups[cat].forEach(function(s) {
      var pct = s.pct || 50;
      html += '<div class="skill-row fade-in">'
        + '<div class="s-icon">'+getLogoHTML(s.name, s.icon)+'</div>'
        + '<div style="flex:1"><div style="font-size:.95rem;font-weight:600;color:var(--white);margin-bottom:2px">'+s.name+'</div>'
        + (s.desc ? '<div style="font-size:.78rem;color:var(--muted)">'+s.desc+'</div>' : '')
        + '</div>'
        + '<div class="s-bar"><div class="s-fill" data-pct="'+pct+'"></div></div>'
        + '<span class="s-level">'+s.level+'</span>'
        + '</div>';
    });
    html += '</div>';
  });
  document.getElementById('skillsOut').innerHTML = html;
  reObserve();
  setTimeout(function() {
    document.querySelectorAll('.s-fill').forEach(function(b) { b.style.width = b.dataset.pct+'%'; });
  }, 300);
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  // Show defaults immediately so page never looks blank
  renderSkills(DEFAULT_SKILLS);
  // Then load from Firebase and override if data exists
  getSiteData('skills').then(function(d) {
    if (d && d.list && d.list.length) {
      renderSkills(d.list);
    }
  });
});
</script>
</body>
</html>
