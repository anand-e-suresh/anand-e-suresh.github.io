<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Skills — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="app.js"></script>
<style>
.cat-label{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent3);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.skill-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 22px;display:flex;align-items:center;gap:16px;transition:all .3s;margin-bottom:12px}
.skill-row:hover{border-color:var(--accent);transform:translateX(6px)}
.s-icon{width:40px;height:40px;background:var(--bg);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.s-bar{width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.s-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;width:0;transition:width 1s ease}
@media(max-width:500px){.s-bar-wrap{display:none}}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// What I Know</div>
    <h1 class="section-title fade-in">Skills</h1>
    <div id="skillsOut"></div>
  </section>
</div>
<div id="_toast" class="toast"></div>
<script>
var DEFAULT_SKILLS = {
  languages:[
    {name:'C',icon:'',desc:'Systems programming & logic building',level:'Learning',pct:45},
    {name:'C++',icon:'',desc:'Object-oriented programming & DSA',level:'Learning',pct:45},
    {name:'Python',icon:'',desc:'Data, scripting & automation',level:'Comfortable',pct:60}
  ],
  libraries:[
    {name:'NumPy',icon:'',desc:'Numerical computing with Python',level:'Familiar',pct:50},
    {name:'Matplotlib',icon:'',desc:'Data visualisation & plotting',level:'Familiar',pct:50},
    {name:'Random (Python)',icon:'',desc:'Random utilities & simulations',level:'Comfortable',pct:65}
  ],
  other:[
    {name:'Problem Solving',icon:'',desc:'Structured thinking & logical decomposition',level:'Strong',pct:75},
    {name:'Scout Leadership',icon:'',desc:'Teamwork, community service & leadership',level:'Experienced',pct:80}
  ]
};
var CAT_LABELS = {languages:'Programming Languages',libraries:'Libraries & Tools',other:'Other Skills'};

// Map skill names to their official logo URLs (SVG/PNG from CDN)
var SKILL_LOGOS = {
  'c':          'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg',
  'c++':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg',
  'python':     'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg',
  'numpy':      'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/numpy/numpy-original.svg',
  'matplotlib': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/matplotlib/matplotlib-original.svg',
  'git':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg',
  'github':     'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg',
  'linux':      'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg',
  'html':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg',
  'css':        'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
  'javascript': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg',
  'java':       'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg',
  'react':      'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg',
  'mysql':      'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg',
  'r':          'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/r/r-original.svg',
  'matlab':     'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/matlab/matlab-original.svg',
  'vscode':     'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg',
  'pandas':     'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/pandas/pandas-original.svg',
};

function getSkillLogo(name, customIcon) {
  if (customIcon) return '<img src="'+customIcon+'" style="width:28px;height:28px;object-fit:contain;filter:brightness(1.1)"/>';
  var key = name.toLowerCase().replace(/[^a-z0-9+]/g,'');
  var url = SKILL_LOGOS[key] || SKILL_LOGOS[name.toLowerCase()];
  if (url) return '<img src="'+url+'" style="width:28px;height:28px;object-fit:contain" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\"font-family:JetBrains Mono,monospace;font-size:.65rem;color:var(--muted);\">'+name.slice(0,3)+'</span>'"/>';
  // Fallback: first 2-3 chars of name
  return '<span style="font-family:JetBrains Mono,monospace;font-size:.65rem;color:var(--muted);letter-spacing:0">'+name.slice(0,3)+'</span>';
}

function skillHTML(s) {
  return '<div class="skill-row fade-in">'
    + '<div class="s-icon">'+getSkillLogo(s.name, s.icon)+'</div>'
    + '<div><div style="font-size:.95rem;font-weight:600;color:var(--white)">'+(s.name)+'</div>'
    + '<div style="font-size:.8rem;color:var(--muted);margin-top:2px">'+(s.desc||'')+'</div></div>'
    + '<div class="s-bar-wrap" style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0">'
    + '<div class="s-bar"><div class="s-fill" data-pct="'+(s.pct)+'"></div></div>'
    + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:var(--muted);white-space:nowrap">'+(s.level)+'</span></div></div>';
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('skills').then(function(d) {
    var s = (d && d.skills) ? d.skills : DEFAULT_SKILLS;
    var html = '';
    ['languages','libraries','other'].forEach(function(cat) {
      var arr = s[cat] || DEFAULT_SKILLS[cat];
      if (!arr || !arr.length) return;
      html += '<div style="margin-bottom:48px" class="fade-in"><div class="cat-label">'+CAT_LABELS[cat]+'</div>'
            + arr.map(skillHTML).join('') + '</div>';
    });
    document.getElementById('skillsOut').innerHTML = html;
    reObserve();
    setTimeout(function() {
      document.querySelectorAll('.s-fill').forEach(function(b) { b.style.width = b.dataset.pct+'%'; });
    }, 400);
  });
});
</script>
</body>
</html>
