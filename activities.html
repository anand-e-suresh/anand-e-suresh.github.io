<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Activities — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="app.js"></script>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// Giving Back</div>
    <h1 class="section-title fade-in">Activities</h1>
    <div class="fade-in" style="background:linear-gradient(135deg,var(--bg3),rgba(232,255,71,.03));border:1px solid var(--border);border-radius:16px;padding:32px 36px;margin-bottom:60px;display:flex;gap:28px;align-items:center;flex-wrap:wrap">
      <div style="width:76px;height:76px;background:var(--bg);border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.1rem;flex-shrink:0;box-shadow:0 0 20px rgba(232,255,71,.2)"></div>
      <div>
        <h3 style="font-size:1.25rem;font-weight:800;color:var(--white);margin-bottom:6px">Scout & Community Service</h3>
        <p style="font-size:.9rem;color:var(--muted);line-height:1.6;max-width:500px">As a Scout, I organised blood donation drives, hair donation campaigns for cancer patients, and various community outreach programmes — experiences that shaped my leadership and empathy.</p>
      </div>
    </div>
    <div id="actGrid" class="activity-grid"></div>
    <div id="emptyState" style="text-align:center;padding:60px 0">
      <div style="font-size:3rem;margin-bottom:16px"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--muted);letter-spacing:2px">Activities & photos coming soon</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:8px">Add via Admin Panel</div>
    </div>
  </section>
</div>
<div id="lightbox"><button id="lightbox-close"></button><img id="lightbox-img" src="" alt=""/></div>
<div id="_toast" class="toast"></div>
<script>
function openLB(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
document.getElementById('lightbox-close').onclick=function(){document.getElementById('lightbox').classList.remove('open');};
document.getElementById('lightbox').onclick=function(e){if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');};

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('activities').then(function(d) {
    var list=(d&&d.list)?d.list:[];
    if(!list.length) return;
    document.getElementById('emptyState').style.display='none';
    document.getElementById('actGrid').innerHTML=list.map(function(a){
      return '<div class="activity-card fade-in">'
        +(a.coverImage?'<img class="activity-card-img" src="'+a.coverImage+'" alt="'+a.title+'">':'')
        +'<div class="activity-card-body" style="text-align:'+(a.alignment||'left')+'">'
        +'<div class="activity-card-tag">'+(a.category||'Scout Activity')+'</div>'
        +'<div class="activity-card-title">'+a.title+'</div>'
        +'<div class="activity-card-desc">'+(a.description||'')+'</div>'
        +(a.date?'<div style="font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:var(--muted);margin-top:8px;letter-spacing:1px">'+a.date+'</div>':'')
        +((a.images&&a.images.length)?'<div class="act-img-grid">'+a.images.map(function(src){return '<img src="'+src+'" onclick="openLB(\''+src+'\')" alt="Activity photo"/>';}).join('')+'</div>':'')
        +'</div></div>';
    }).join('');
    reObserve();
  });
});
</script>
</body>
</html>
