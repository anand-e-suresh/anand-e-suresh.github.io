<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Experience — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<style>
.exp-item {
  display: flex;
  gap: 24px;
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.exp-item:last-child { border-bottom: none; }
.exp-logo-box {
  width: 52px; height: 52px;
  min-width: 52px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-top: 4px;
  flex-shrink: 0;
}
.exp-logo-box img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 6px;
}
.exp-logo-initials {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  padding: 4px;
  line-height: 1.3;
}
.exp-body { flex: 1; }
</style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// Work &amp; Internships</div>
    <h1 class="section-title fade-in">Experience</h1>
    <div id="expOut"></div>
    <div id="emptyExp" style="padding:60px 0">
      <div style="font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase">Just Getting Started</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:8px">Add internships &amp; roles via the Admin Panel</div>
    </div>
  </section>
</div>
<div id="_toast" class="toast"></div>
<script>
function expHTML(e) {
  var initials = (e.org || e.company || 'Co').split(' ').slice(0,2).map(function(w){return w[0];}).join('');
  var logoBox = e.logo
    ? '<div class="exp-logo-box"><img src="'+e.logo+'" alt="logo"/></div>'
    : '<div class="exp-logo-box"><div class="exp-logo-initials">'+initials+'</div></div>';

  return '<div class="exp-item fade-in">'
    + logoBox
    + '<div class="exp-body">'
    + '<div style="font-family:var(--font-mono);font-size:.62rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">'+(e.period||e.type||'')+'</div>'
    + '<div style="font-family:var(--font-display);font-size:1.4rem;font-weight:500;color:var(--white);margin-bottom:4px">'+(e.title||e.role||'')+'</div>'
    + '<div style="font-size:.88rem;color:var(--muted);margin-bottom:12px">'+(e.org||e.company||'')+'</div>'
    + (e.description ? '<p style="font-size:.88rem;color:var(--text);line-height:1.75;margin-bottom:12px">'+e.description+'</p>' : '')
    + '</div></div>';
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('experience').then(function(d) {
    var list = (d && d.list) ? d.list : [];
    if (!list.length) return;
    document.getElementById('emptyExp').style.display = 'none';
    document.getElementById('expOut').innerHTML = list.map(expHTML).join('');
    reObserve();
  });
});
</script>
</body>
</html>
