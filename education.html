<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Education — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<style>
.edu-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px 36px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  transition: all .3s;
  display: flex;
  gap: 28px;
  align-items: flex-start;
}
.edu-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--accent), var(--accent3));
}
.edu-card:hover { border-color: rgba(200,230,60,.25); transform: translateX(4px); }
.edu-logo-box {
  width: 56px; height: 56px;
  min-width: 56px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-top: 4px;
}
.edu-logo-box img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 6px;
}
.edu-logo-initials {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  padding: 4px;
  line-height: 1.3;
}
.edu-body { flex: 1; }
.edu-num {
  position: absolute;
  top: 20px; right: 24px;
  font-family: var(--font-display);
  font-size: 4rem;
  color: var(--border);
  line-height: 1;
  pointer-events: none;
  font-weight: 300;
}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// Academic Journey</div>
    <h1 class="section-title fade-in">Education</h1>
    <div id="eduOut"></div>
  </section>
</div>
<div id="_toast" class="toast"></div>
<script>
var DEFAULT_EDU = [
  { institution: 'Plaksha University', degree: 'B.Tech — Technology, Design & Innovation', period: '2024 — Present', location: 'Mohali, Punjab, India', mapLink: 'https://maps.app.goo.gl/FpDBcPXq4Pvie51b6', logo: '' },
  { institution: 'St. Thomas Higher Secondary School', degree: 'Higher Secondary — Science Stream', period: '2022 — 2024 · Class 11–12', location: 'Thomapuram, Chittarikkal, Kerala', mapLink: 'https://maps.app.goo.gl/SZAAXDVCPLqpyDtXA', logo: '' },
  { institution: "St. Mary's EMHS", degree: 'Primary & Secondary Education', period: 'Up to 2022 · Class 1–10', location: 'Chittarikkal, Kerala', mapLink: 'https://maps.app.goo.gl/DkdgLgsadGV7gkwa7', logo: '' }
];

function eduHTML(e, i) {
  var initials = e.institution.split(' ').slice(0,2).map(function(w){return w[0];}).join('');
  var logoBox = e.logo
    ? '<div class="edu-logo-box"><img src="'+e.logo+'" alt="'+e.institution+' logo"/></div>'
    : '<div class="edu-logo-box"><div class="edu-logo-initials">'+initials+'</div></div>';

  return '<div class="edu-card fade-in">'
    + '<div class="edu-num">0'+(i+1)+'</div>'
    + logoBox
    + '<div class="edu-body">'
    + '<div style="font-family:var(--font-mono);font-size:.65rem;color:var(--accent);letter-spacing:3px;margin-bottom:10px;text-transform:uppercase">'+e.period+'</div>'
    + '<div style="font-family:var(--font-display);font-size:1.4rem;font-weight:500;color:var(--white);margin-bottom:4px">'+e.institution+'</div>'
    + '<div style="font-size:.9rem;color:var(--text);margin-bottom:10px">'+e.degree+'</div>'
    + '<div style="font-family:var(--font-mono);font-size:.65rem;color:var(--muted);margin-bottom:12px;letter-spacing:1px">'+e.location+'</div>'
    + (e.mapLink ? '<a class="timeline-link" href="'+e.mapLink+'" target="_blank">View on Map &#8594;</a>' : '')
    + '</div></div>';
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('education').then(function(d) {
    var list = (d && d.list && d.list.length) ? d.list : DEFAULT_EDU;
    document.getElementById('eduOut').innerHTML = list.map(eduHTML).join('');
    reObserve();
  });
});
</script>
</body>
</html>
