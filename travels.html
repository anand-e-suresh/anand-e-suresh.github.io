<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Travels — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section">
    <span class="section-eyebrow fade-in">// Travels</span>
    <h1 class="section-title fade-in">Places<br/><strong>I've Been</strong></h1>
    <div id="globe-wrap">
      <canvas id="globe-canvas"></canvas>
      <div class="globe-hint">Drag to rotate &middot; Click markers to explore</div>
      <div class="place-panel" id="placePanel">
        <button class="place-panel-close" id="ppClose">&#10005;</button>
        <div class="place-panel-name" id="ppName"></div>
        <div class="place-panel-desc" id="ppDesc"></div>
        <div class="place-panel-imgs" id="ppImgs"></div>
      </div>
    </div>
    <div id="placesList" class="places-list fade-in"></div>
  </section>
</div>
<div id="lightbox"><button id="lightbox-close">&#10005;</button><img id="lightbox-img" src="" alt=""/></div>
<div id="_toast" class="toast"></div>
<script>
var placesData = [];

function openLB(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').onclick = function() { document.getElementById('lightbox').classList.remove('open'); };
document.getElementById('lightbox').onclick = function(e) { if (e.target === this) this.classList.remove('open'); };
document.getElementById('ppClose').onclick = function() { document.getElementById('placePanel').classList.remove('visible'); };

// ══ REAL EARTH TEXTURE — drawn as canvas, accurate continent shapes ══
function buildEarthTexture(W, H) {
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var g = c.getContext('2d');

  // Ocean
  var ocean = g.createRadialGradient(W*0.4, H*0.4, 0, W*0.5, H*0.5, W*0.7);
  ocean.addColorStop(0, '#0e2d50');
  ocean.addColorStop(1, '#071828');
  g.fillStyle = ocean;
  g.fillRect(0, 0, W, H);

  // Ocean shimmer
  g.fillStyle = 'rgba(30,100,180,0.07)';
  for (var i = 0; i < 80; i++) {
    g.beginPath();
    g.arc(Math.random()*W, Math.random()*H, Math.random()*30+5, 0, Math.PI*2);
    g.fill();
  }

  // Land colour
  g.fillStyle = '#2d5a27';

  // Helper: draw polygon from array of [x%,y%] normalised coords
  function poly(pts) {
    g.beginPath();
    g.moveTo(pts[0][0]*W, pts[0][1]*H);
    for (var i = 1; i < pts.length; i++) g.lineTo(pts[i][0]*W, pts[i][1]*H);
    g.closePath(); g.fill();
  }

  // ── North America ──
  poly([[0.09,0.12],[0.13,0.10],[0.18,0.09],[0.22,0.12],[0.25,0.17],[0.26,0.22],
        [0.24,0.28],[0.22,0.33],[0.20,0.38],[0.19,0.42],[0.17,0.44],[0.15,0.42],
        [0.13,0.38],[0.11,0.32],[0.10,0.25],[0.08,0.18]]);
  // Baja peninsula
  poly([[0.18,0.38],[0.19,0.40],[0.18,0.47],[0.17,0.46],[0.17,0.39]]);
  // Alaska
  poly([[0.04,0.12],[0.09,0.10],[0.09,0.15],[0.06,0.17],[0.03,0.15]]);
  // Greenland
  poly([[0.24,0.06],[0.30,0.04],[0.35,0.06],[0.34,0.12],[0.29,0.15],[0.24,0.12]]);

  // ── Central America ──
  poly([[0.19,0.42],[0.21,0.43],[0.20,0.48],[0.18,0.47],[0.18,0.44]]);

  // ── South America ──
  poly([[0.19,0.49],[0.23,0.47],[0.26,0.49],[0.28,0.54],[0.28,0.60],
        [0.26,0.67],[0.24,0.74],[0.22,0.79],[0.20,0.82],[0.18,0.80],
        [0.18,0.75],[0.19,0.68],[0.20,0.60],[0.19,0.54]]);

  // ── Europe ──
  poly([[0.44,0.13],[0.47,0.11],[0.51,0.12],[0.52,0.16],[0.50,0.20],
        [0.47,0.22],[0.44,0.21],[0.43,0.17]]);
  // Iberia
  poly([[0.42,0.20],[0.45,0.20],[0.46,0.25],[0.43,0.26],[0.41,0.23]]);
  // Scandinavia
  poly([[0.47,0.07],[0.50,0.06],[0.52,0.09],[0.50,0.14],[0.47,0.14],[0.46,0.10]]);
  // UK
  poly([[0.43,0.14],[0.45,0.13],[0.46,0.17],[0.44,0.18],[0.42,0.16]]);
  // Italy
  poly([[0.48,0.20],[0.50,0.20],[0.51,0.26],[0.49,0.28],[0.48,0.25]]);

  // ── Africa ──
  poly([[0.44,0.26],[0.49,0.24],[0.53,0.26],[0.55,0.32],[0.55,0.40],
        [0.53,0.48],[0.51,0.57],[0.50,0.64],[0.49,0.68],[0.47,0.66],
        [0.45,0.59],[0.44,0.51],[0.43,0.43],[0.43,0.35],[0.43,0.29]]);
  // Madagascar
  poly([[0.56,0.50],[0.57,0.48],[0.58,0.52],[0.57,0.56],[0.55,0.54]]);

  // ── Middle East & Arabian Peninsula ──
  poly([[0.54,0.24],[0.58,0.22],[0.61,0.24],[0.62,0.29],[0.60,0.34],
        [0.56,0.36],[0.54,0.33],[0.53,0.28]]);

  // ── Asia (main body) ──
  poly([[0.52,0.10],[0.58,0.08],[0.65,0.08],[0.72,0.10],[0.78,0.13],
        [0.82,0.17],[0.82,0.22],[0.78,0.26],[0.73,0.30],[0.68,0.32],
        [0.63,0.35],[0.58,0.37],[0.55,0.35],[0.54,0.30],[0.54,0.24],
        [0.56,0.22],[0.57,0.18],[0.54,0.16]]);
  // India subcontinent
  poly([[0.61,0.32],[0.65,0.31],[0.67,0.35],[0.66,0.42],[0.63,0.46],
        [0.61,0.44],[0.60,0.38]]);
  // Southeast Asia
  poly([[0.70,0.32],[0.74,0.31],[0.76,0.35],[0.74,0.40],[0.71,0.42],
        [0.69,0.38]]);
  // Korean peninsula
  poly([[0.78,0.22],[0.80,0.21],[0.81,0.25],[0.79,0.27],[0.77,0.25]]);
  // Japan (main)
  poly([[0.81,0.20],[0.83,0.19],[0.84,0.22],[0.82,0.24],[0.80,0.23]]);

  // ── Australia ──
  poly([[0.72,0.55],[0.78,0.53],[0.82,0.56],[0.83,0.62],[0.81,0.68],
        [0.76,0.72],[0.71,0.71],[0.69,0.66],[0.70,0.59]]);
  // New Zealand
  poly([[0.85,0.68],[0.87,0.66],[0.88,0.70],[0.86,0.72],[0.84,0.70]]);

  // ── Antarctica (bottom strip) ──
  g.fillStyle = '#c8dde8';
  g.fillRect(0, H*0.88, W, H*0.12);

  // ── Ice caps (top) ──
  g.fillStyle = '#c8dde8';
  g.fillRect(0, 0, W, H*0.04);

  // Subtle latitude lines
  g.strokeStyle = 'rgba(255,255,255,0.04)';
  g.lineWidth = 1;
  for (var lat = 1; lat < 6; lat++) {
    g.beginPath();
    g.moveTo(0, H * lat/6);
    g.lineTo(W, H * lat/6);
    g.stroke();
  }
  // Longitude lines
  for (var lon = 1; lon < 8; lon++) {
    g.beginPath();
    g.moveTo(W * lon/8, 0);
    g.lineTo(W * lon/8, H);
    g.stroke();
  }

  return new THREE.CanvasTexture(c);
}

// ══ GLOBE INIT ══
function initGlobe() {
  var canvas = document.getElementById('globe-canvas');
  var wrap   = document.getElementById('globe-wrap');
  var W = wrap.clientWidth, H = wrap.clientHeight;

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 100);
  camera.position.z = 2.8;

  var earthTex = buildEarthTexture(2048, 1024);
  var earthMat = new THREE.MeshPhongMaterial({
    map: earthTex,
    specular: new THREE.Color(0x112233),
    shininess: 15
  });
  var earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), earthMat);
  scene.add(earth);

  // Atmosphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(1.06, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x3ab8d4, opacity: 0.05, transparent: true, side: THREE.BackSide })
  ));

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  var sun = new THREE.DirectionalLight(0xfff5e0, 1.0);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // ── Lat/Lng → 3D position ──
  function ll3d(lat, lng, r) {
    r = r || 1.022;
    var phi   = (90 - lat)  * Math.PI / 180;
    var theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  // ── Place markers ──
  var markers = [];
  function plotPlaces(places) {
    markers.forEach(function(m) { earth.remove(m); });
    markers = [];
    places.forEach(function(p, i) {
      if (p.lat == null || p.lng == null) return;
      // Dot
      var dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.018, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xc8e63c })
      );
      dot.position.copy(ll3d(p.lat, p.lng));
      dot.userData = { placeIdx: i };
      earth.add(dot);
      markers.push(dot);
      // Pulse ring
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(0.022, 0.034, 16),
        new THREE.MeshBasicMaterial({ color: 0xc8e63c, opacity: 0.4, transparent: true, side: THREE.DoubleSide })
      );
      ring.position.copy(ll3d(p.lat, p.lng));
      ring.lookAt(new THREE.Vector3(0, 0, 0));
      ring.userData = { pulse: true };
      earth.add(ring);
      markers.push(ring);
    });
  }

  // Click to open panel
  var raycaster = new THREE.Raycaster();
  var mouse     = new THREE.Vector2();
  var didDrag   = false;
  canvas.addEventListener('click', function(e) {
    if (didDrag) return;
    var rect = canvas.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var clickable = markers.filter(function(m) { return m.userData.placeIdx !== undefined; });
    var hits = raycaster.intersectObjects(clickable);
    if (hits.length) {
      var idx = hits[0].object.userData.placeIdx;
      showPanel(placesData[idx]);
    }
  });

  // Drag rotate
  var dragging = false, prev = { x: 0, y: 0 }, vel = { x: 0, y: 0 };
  canvas.addEventListener('mousedown',  function(e) { dragging=true; didDrag=false; prev={x:e.clientX,y:e.clientY}; vel={x:0,y:0}; });
  canvas.addEventListener('mousemove',  function(e) { if(!dragging)return; didDrag=true; vel.y=(e.clientX-prev.x)*0.005; vel.x=(e.clientY-prev.y)*0.005; prev={x:e.clientX,y:e.clientY}; });
  canvas.addEventListener('mouseup',    function() { dragging=false; });
  canvas.addEventListener('mouseleave', function() { dragging=false; });
  canvas.addEventListener('touchstart', function(e) { dragging=true; didDrag=false; prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:true});
  canvas.addEventListener('touchmove',  function(e) { e.preventDefault(); didDrag=true; vel.y=(e.touches[0].clientX-prev.x)*0.005; vel.x=(e.touches[0].clientY-prev.y)*0.005; prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:false});
  canvas.addEventListener('touchend',   function() { dragging=false; });

  // Animate
  (function animate() {
    requestAnimationFrame(animate);
    if (!dragging) {
      vel.x *= 0.90;
      vel.y *= 0.90;
      if (Math.abs(vel.x) < 0.0002 && Math.abs(vel.y) < 0.0002) vel.y = 0.0018;
    }
    earth.rotation.x += vel.x;
    earth.rotation.y += vel.y;
    var t = Date.now() * 0.003;
    markers.forEach(function(m) {
      if (m.userData.pulse) { var s = 1 + 0.18 * Math.sin(t); m.scale.setScalar(s); }
    });
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', function() {
    W = wrap.clientWidth; H = wrap.clientHeight;
    camera.aspect = W/H; camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  return { plotPlaces: plotPlaces };
}

function showPanel(p) {
  if (!p) return;
  document.getElementById('ppName').textContent = p.name || '';
  document.getElementById('ppDesc').textContent = p.description || '';
  var imgs = document.getElementById('ppImgs');
  imgs.innerHTML = '';
  (p.images || []).forEach(function(u) {
    var img = document.createElement('img');
    img.src = u;
    img.onclick = function() { openLB(u); };
    imgs.appendChild(img);
  });
  document.getElementById('placePanel').classList.add('visible');
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  var globe = initGlobe();

  getSiteData('travels').then(function(d) {
    placesData = (d && d.list) ? d.list : [];

    // Show globe markers
    globe.plotPlaces(placesData);

    // Show chips below globe
    var list = document.getElementById('placesList');
    if (placesData.length) {
      list.innerHTML = placesData.map(function(p, i) {
        return '<button class="place-chip" onclick="showPanel(placesData[' + i + '])">' + p.name + '</button>';
      }).join('');
    } else {
      list.innerHTML = '<span style="font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:2px">No places added yet — add them via the Admin Panel</span>';
    }

    reObserve();
  });
});
</script>
</body>
</html>
