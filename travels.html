<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Travels — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section">
    <span class="section-eyebrow fade-in">// Travels</span>
    <h1 class="section-title fade-in">Places<br/><strong>I've Been</strong></h1>
    <div id="globe-wrap">
      <canvas id="globe-canvas"></canvas>
      <div class="globe-hint">Drag to rotate &middot; Click markers to explore</div>
      <div class="place-panel" id="placePanel">
        <button class="place-panel-close" id="ppClose">&#10005;</button>
        <div class="place-panel-name" id="ppName"></div>
        <div class="place-panel-desc" id="ppDesc"></div>
        <div class="place-panel-imgs" id="ppImgs"></div>
      </div>
    </div>
    <div id="placesList" class="places-list fade-in"></div>
  </section>
</div>
<div id="lightbox"><button id="lightbox-close">&#10005;</button><img id="lightbox-img" src="" alt=""/></div>
<div id="_toast" class="toast"></div>

<script>
var placesData = [];

function openLB(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').onclick = function() { document.getElementById('lightbox').classList.remove('open'); };
document.getElementById('lightbox').onclick = function(e) { if (e.target === this) this.classList.remove('open'); };
document.getElementById('ppClose').onclick = function() { document.getElementById('placePanel').classList.remove('visible'); };

// ══ BUILD PHOTOREALISTIC EARTH TEXTURE ON CANVAS ══
// Uses accurate continent outlines based on geographic coordinates mapped to equirectangular projection
function buildEarthTexture(W, H) {
  var cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  var g = cv.getContext('2d');

  // Deep ocean with depth gradient
  var oceanGrad = g.createLinearGradient(0, 0, 0, H);
  oceanGrad.addColorStop(0,   '#071e3d');
  oceanGrad.addColorStop(0.3, '#0d2d52');
  oceanGrad.addColorStop(0.7, '#0a2444');
  oceanGrad.addColorStop(1,   '#071020');
  g.fillStyle = oceanGrad;
  g.fillRect(0, 0, W, H);

  // Ocean depth variation (shallow seas lighter)
  g.fillStyle = 'rgba(20,80,160,0.12)';
  // Mediterranean
  g.fillRect(W*0.44, H*0.22, W*0.10, H*0.05);
  // Caribbean
  g.fillRect(W*0.20, H*0.38, W*0.07, H*0.06);
  // South China Sea
  g.fillRect(W*0.68, H*0.28, W*0.07, H*0.10);

  // Convert lat/lng to canvas x,y
  function pt(lat, lng) {
    return [(lng + 180) / 360 * W, (90 - lat) / 180 * H];
  }

  function land(coords) {
    if (!coords.length) return;
    g.beginPath();
    var p0 = pt(coords[0][0], coords[0][1]);
    g.moveTo(p0[0], p0[1]);
    for (var i = 1; i < coords.length; i++) {
      var p = pt(coords[i][0], coords[i][1]);
      g.lineTo(p[0], p[1]);
    }
    g.closePath();
    g.fill();
  }

  // Land base colour
  g.fillStyle = '#3d6b35';

  // ── NORTH AMERICA ──
  land([[70,-140],[72,-120],[71,-100],[68,-85],[60,-65],[55,-60],[47,-53],[44,-66],
        [35,-75],[25,-80],[20,-87],[15,-85],[10,-83],[8,-77],[9,-79],[8,-77],
        [15,-92],[18,-88],[16,-90],[15,-92],[20,-105],[22,-106],[20,-87],
        [30,-110],[32,-117],[34,-120],[40,-124],[48,-124],[54,-130],[58,-136],
        [60,-140],[65,-168],[68,-166],[71,-156],[72,-140],[70,-140]]);

  // ── GREENLAND ──
  land([[83,-45],[82,-20],[78,-18],[72,-22],[68,-28],[65,-40],[66,-52],
        [70,-52],[76,-66],[80,-58],[83,-45]]);

  // ── ALASKA ──
  land([[55,-130],[58,-136],[60,-146],[62,-150],[60,-166],[63,-168],[65,-168],
        [68,-166],[68,-162],[66,-162],[60,-162],[56,-158],[54,-158],[55,-130]]);

  // ── CENTRAL AMERICA ──
  land([[20,-87],[18,-88],[16,-90],[14,-92],[10,-83],[8,-77],[9,-79],[10,-83],
        [14,-92],[16,-90],[18,-88],[20,-87]]);

  // ── CUBA ──
  land([[23,-82],[22,-79],[20,-75],[22,-74],[23,-82]]);

  // ── SOUTH AMERICA ──
  land([[12,-72],[10,-62],[8,-60],[5,-52],[2,-50],[0,-50],[-5,-35],[-8,-35],
        [-10,-37],[-15,-39],[-22,-43],[-23,-43],[-30,-50],[-33,-52],[-38,-57],
        [-42,-63],[-45,-65],[-52,-70],[-55,-66],[-52,-70],[-45,-65],[-38,-57],
        [-30,-70],[-25,-70],[-18,-70],[-15,-75],[-10,-78],[-5,-80],[0,-80],
        [5,-77],[8,-77],[10,-72],[12,-72]]);

  // ── EUROPE ──
  land([[36,-9],[38,-9],[40,-8],[44,-8],[46,-2],[48,2],[51,2],[52,5],[54,8],
        [55,10],[58,5],[58,11],[60,5],[62,6],[64,14],[68,14],[70,25],[70,28],
        [68,28],[65,24],[62,24],[60,24],[58,21],[56,20],[55,21],[54,18],[52,18],
        [50,14],[48,16],[46,14],[44,12],[42,12],[38,15],[37,15],[36,14],
        [35,12],[37,10],[36,5],[36,-2],[36,-5],[36,-9]]);

  // Scandinavia separately for accuracy
  land([[58,5],[60,5],[62,6],[64,14],[68,14],[70,25],[72,25],[74,20],
        [70,16],[68,14],[65,14],[62,14],[60,10],[58,10],[56,10],[57,8],[58,5]]);

  // ── UK & IRELAND ──
  land([[50,-5],[52,-5],[54,-3],[56,-4],[58,-5],[58,-3],[56,-2],[53,0],
        [51,2],[50,2],[50,-5]]);
  land([[51,-10],[53,-10],[55,-8],[53,-6],[51,-8],[51,-10]]); // Ireland

  // ── ICELAND ──
  land([[64,-24],[66,-22],[65,-18],[63,-14],[63,-18],[64,-22],[64,-24]]);

  // ── AFRICA ──
  land([[37,10],[35,10],[33,12],[30,32],[25,32],[20,38],[12,44],[10,42],
        [8,38],[4,38],[0,42],[-2,40],[-5,38],[-10,40],[-15,35],[-20,35],
        [-25,33],[-30,30],[-35,26],[-34,20],[-32,18],[-28,16],[-20,12],
        [-15,12],[-10,14],[-5,10],[0,6],[4,2],[4,8],[0,10],[4,8],
        [8,2],[8,-5],[5,-8],[4,-5],[2,-10],[4,-12],[8,-15],[10,-17],
        [15,-17],[18,-16],[20,-17],[24,-15],[28,-13],[30,-10],[35,-6],
        [37,10]]);

  // ── MADAGASCAR ──
  land([[-12,44],[-14,48],[-18,48],[-22,44],[-25,44],[-22,44],[-18,44],[-12,44]]);

  // ── ARABIAN PENINSULA ──
  land([[30,32],[28,34],[22,36],[12,44],[10,42],[8,45],[12,50],[18,56],
        [22,60],[24,58],[28,56],[28,50],[30,48],[32,40],[30,32]]);

  // ── SOUTH ASIA / INDIA ──
  land([[24,68],[28,64],[30,66],[34,68],[36,72],[34,74],[30,78],[28,84],
        [26,88],[24,90],[22,92],[8,78],[8,77],[10,76],[8,78],[10,80],
        [14,80],[18,82],[20,84],[22,88],[24,90],[26,88],[28,84],[30,78],
        [28,72],[24,68]]);

  // Sri Lanka
  land([[10,80],[8,80],[6,82],[8,82],[10,80]]);

  // ── SOUTHEAST ASIA ──
  land([[28,98],[24,98],[20,100],[16,100],[10,100],[4,104],[2,104],[4,108],
        [8,108],[10,106],[14,108],[18,106],[20,106],[22,100],[24,100],[28,98]]);

  // ── INDOCHINA / MALAY PENINSULA ──
  land([[10,100],[6,100],[4,104],[2,104],[4,108],[4,104],[2,104],[0,104],
        [4,110],[8,110],[10,106],[14,108],[10,100]]);

  // ── CHINA / EAST ASIA ──
  land([[22,100],[24,100],[28,98],[32,96],[36,90],[40,90],[42,84],[44,82],
        [48,86],[52,86],[54,90],[52,140],[48,140],[44,136],[40,128],[36,122],
        [32,120],[28,120],[24,116],[20,110],[18,110],[22,108],[22,100]]);

  // ── KOREAN PENINSULA ──
  land([[38,126],[34,126],[34,128],[36,130],[38,130],[40,128],[38,126]]);

  // ── JAPAN (main islands) ──
  land([[32,130],[34,132],[36,136],[38,140],[42,142],[44,144],[42,142],
        [38,140],[36,136],[34,134],[32,132],[32,130]]);
  land([[42,140],[44,142],[44,144],[42,144],[42,140]]); // Hokkaido

  // ── CENTRAL ASIA / RUSSIA ──
  land([[52,30],[56,36],[60,40],[64,40],[68,50],[68,60],[66,70],[68,80],
        [70,90],[70,100],[68,110],[70,130],[68,140],[64,142],[60,142],
        [56,140],[54,136],[52,130],[50,128],[46,134],[44,132],[50,128],
        [52,120],[56,110],[56,100],[54,90],[54,82],[52,72],[48,60],[48,50],
        [44,48],[44,42],[48,44],[50,36],[52,30]]);

  // ── TURKEY ──
  land([[36,26],[38,26],[42,26],[42,36],[38,44],[36,38],[36,32],[36,28],[36,26]]);

  // ── AUSTRALIA ──
  land([[-14,128],[-12,130],[-14,136],[-12,136],[-14,136],[-16,136],
        [-18,140],[-22,150],[-28,154],[-34,152],[-38,146],[-38,140],
        [-36,136],[-32,134],[-30,116],[-22,114],[-18,122],[-14,128]]);

  // ── NEW ZEALAND ──
  land([[-36,174],[-38,176],[-44,170],[-46,168],[-44,170],[-38,176],[-36,174]]);
  land([[-40,172],[-42,172],[-44,168],[-46,168],[-44,170],[-42,172],[-40,172]]);

  // ── INDONESIA (Java, Sumatra, Borneo) ──
  land([[-6,106],[-6,108],[-8,112],[-8,114],[-6,114],[-6,108],[-6,106]]);
  land([[6,96],[4,98],[0,102],[-2,106],[-6,106],[0,110],[2,108],[4,104],[6,96]]);
  land([[4,116],[2,118],[0,118],[-2,116],[-4,114],[-4,118],[0,118],[4,118],[4,116]]);

  // ── PHILIPPINES ──
  land([[10,122],[14,124],[16,120],[12,122],[10,122]]);

  // ── ANTARCTICA ──
  g.fillStyle = '#ddeef5';
  land([[-68,0],[-70,30],[-72,60],[-70,90],[-68,120],[-70,150],[-68,180],
        [-70,-150],[-72,-120],[-70,-90],[-68,-60],[-70,-30],[-68,0]]);

  // ── ICE CAPS (Arctic) ──
  g.fillStyle = 'rgba(220,235,245,0.7)';
  g.fillRect(0, 0, W, H * 0.06);

  // ── SUBTLE TERRAIN SHADING on land ──
  var terrainGrad = g.createLinearGradient(0, H*0.1, 0, H*0.85);
  terrainGrad.addColorStop(0,   'rgba(180,200,100,0.06)');
  terrainGrad.addColorStop(0.5, 'rgba(100,150,60,0.04)');
  terrainGrad.addColorStop(1,   'rgba(60,100,40,0.08)');
  g.fillStyle = terrainGrad;
  g.fillRect(0, 0, W, H);

  // ── GRID LINES ──
  g.strokeStyle = 'rgba(255,255,255,0.04)';
  g.lineWidth = 0.5;
  for (var lat2 = -60; lat2 <= 60; lat2 += 30) {
    var y = (90 - lat2) / 180 * H;
    g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke();
  }
  for (var lng2 = -150; lng2 <= 150; lng2 += 30) {
    var x = (lng2 + 180) / 360 * W;
    g.beginPath(); g.moveTo(x, 0); g.lineTo(x, H); g.stroke();
  }

  return new THREE.CanvasTexture(cv);
}

// ══ GLOBE ══
function initGlobe() {
  var canvas = document.getElementById('globe-canvas');
  var wrap   = document.getElementById('globe-wrap');
  var W = wrap.clientWidth, H = wrap.clientHeight;

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 100);
  camera.position.z = 2.6;

  // Earth
  var earthTex = buildEarthTexture(4096, 2048);
  var earth = new THREE.Mesh(
    new THREE.SphereGeometry(1, 80, 80),
    new THREE.MeshPhongMaterial({
      map:       earthTex,
      specular:  new THREE.Color(0x0d1f35),
      shininess: 12
    })
  );
  scene.add(earth);

  // Atmosphere glow
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(1.04, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x4499cc, opacity: 0.06, transparent: true, side: THREE.BackSide })
  ));

  // Lights — sun from upper right
  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  var sun = new THREE.DirectionalLight(0xfff8e8, 0.95);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // Lat/Lng → 3D vector
  function ll3d(lat, lng, r) {
    r = r || 1.025;
    var phi   = (90 - lat)  * Math.PI / 180;
    var theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  // Markers
  var markers = [];
  function plotPlaces(places) {
    markers.forEach(function(m) { earth.remove(m); });
    markers = [];
    places.forEach(function(p, i) {
      if (p.lat == null || p.lng == null) return;

      // Glowing dot
      var dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.016, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xc8e63c })
      );
      dot.position.copy(ll3d(p.lat, p.lng));
      dot.userData = { placeIdx: i };
      earth.add(dot);
      markers.push(dot);

      // Pulse ring
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(0.022, 0.032, 20),
        new THREE.MeshBasicMaterial({ color: 0xc8e63c, opacity: 0.5, transparent: true, side: THREE.DoubleSide })
      );
      ring.position.copy(ll3d(p.lat, p.lng));
      ring.lookAt(new THREE.Vector3(0,0,0));
      ring.userData = { pulse: true };
      earth.add(ring);
      markers.push(ring);
    });
  }

  // Click detection
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var didDrag = false;
  canvas.addEventListener('click', function(e) {
    if (didDrag) return;
    var rect = canvas.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var clickable = markers.filter(function(m) { return m.userData.placeIdx !== undefined; });
    var hits = raycaster.intersectObjects(clickable);
    if (hits.length) showPanel(placesData[hits[0].object.userData.placeIdx]);
  });

  // Drag
  var dragging = false, prev = {x:0,y:0}, vel = {x:0,y:0};
  canvas.addEventListener('mousedown',  function(e) { dragging=true; didDrag=false; prev={x:e.clientX,y:e.clientY}; vel={x:0,y:0}; });
  canvas.addEventListener('mousemove',  function(e) { if(!dragging)return; didDrag=true; vel.y=(e.clientX-prev.x)*0.005; vel.x=(e.clientY-prev.y)*0.005; prev={x:e.clientX,y:e.clientY}; });
  canvas.addEventListener('mouseup',    function() { dragging=false; });
  canvas.addEventListener('mouseleave', function() { dragging=false; });
  canvas.addEventListener('touchstart', function(e) { dragging=true; didDrag=false; prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:true});
  canvas.addEventListener('touchmove',  function(e) { e.preventDefault(); didDrag=true; vel.y=(e.touches[0].clientX-prev.x)*0.005; vel.x=(e.touches[0].clientY-prev.y)*0.005; prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:false});
  canvas.addEventListener('touchend',   function() { dragging=false; });

  // Animate
  (function animate() {
    requestAnimationFrame(animate);
    if (!dragging) { vel.x *= 0.90; vel.y *= 0.90; if (Math.abs(vel.x)<0.0002 && Math.abs(vel.y)<0.0002) vel.y=0.0015; }
    earth.rotation.x += vel.x;
    earth.rotation.y += vel.y;
    var t = Date.now() * 0.003;
    markers.forEach(function(m) { if (m.userData.pulse) m.scale.setScalar(1 + 0.18 * Math.sin(t)); });
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', function() {
    W=wrap.clientWidth; H=wrap.clientHeight;
    camera.aspect=W/H; camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });

  return { plotPlaces: plotPlaces };
}

function showPanel(p) {
  if (!p) return;
  document.getElementById('ppName').textContent = p.name || '';
  document.getElementById('ppDesc').textContent = p.description || '';
  var imgs = document.getElementById('ppImgs');
  imgs.innerHTML = '';
  (p.images || []).forEach(function(u) {
    var img = document.createElement('img');
    img.src = u; img.onclick = function() { openLB(u); };
    imgs.appendChild(img);
  });
  document.getElementById('placePanel').classList.add('visible');
}

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  var globe = initGlobe();
  getSiteData('travels').then(function(d) {
    placesData = (d && d.list) ? d.list : [];
    globe.plotPlaces(placesData);
    var list = document.getElementById('placesList');
    if (placesData.length) {
      list.innerHTML = placesData.map(function(p, i) {
        return '<button class="place-chip" onclick="showPanel(placesData['+i+'])">' + p.name + '</button>';
      }).join('');
    } else {
      list.innerHTML = '<span style="font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase">No places added yet — add them via Admin Panel → Travels</span>';
    }
    reObserve();
  });
});
</script>
</body>
</html>
