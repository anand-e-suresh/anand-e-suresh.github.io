<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Volunteer — Anand E Suresh</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<style>
.vol-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px 36px;margin-bottom:20px;position:relative;overflow:hidden;transition:all .3s}
.vol-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--accent3))}
.vol-card:hover{border-color:rgba(232,255,71,.3);transform:translateX(4px)}
.vol-card-tag{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.vol-card-title{font-size:1.2rem;font-weight:800;color:var(--white);margin-bottom:6px}
.vol-card-org{font-size:.9rem;color:var(--muted);margin-bottom:12px}
.vol-card-desc{font-size:.9rem;color:var(--text);line-height:1.7}
.vol-card-date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:14px;letter-spacing:1px}
.vol-card-img{width:100%;max-height:260px;object-fit:cover;border-radius:8px;margin-top:16px;border:1px solid var(--border)}
.vol-img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px}
.vol-img-grid img{width:100%;height:120px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:transform .2s,border-color .2s}
.vol-img-grid img:hover{transform:scale(1.03);border-color:var(--accent)}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <section class="section" style="padding-top:80px">
    <div class="section-eyebrow fade-in">// Giving Back</div>
    <h1 class="section-title fade-in">Volunteer Work</h1>
    <div id="volOut"></div>
    <div id="emptyState" style="text-align:center;padding:80px 0">
      <div style="font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase">No entries yet</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:8px">Add volunteer work via the Admin Panel</div>
    </div>
  </section>
</div>
<div id="lightbox"><button id="lightbox-close">&#10005;</button><img id="lightbox-img" src="" alt=""/></div>
<div id="_toast" class="toast"></div>
<script>
function openLB(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
document.getElementById('lightbox-close').onclick=function(){document.getElementById('lightbox').classList.remove('open');};
document.getElementById('lightbox').onclick=function(e){if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');};

document.addEventListener('DOMContentLoaded', function() {
  initPage();
  getSiteData('volunteer').then(function(d) {
    var list = (d && d.list) ? d.list : [];
    if (!list.length) return;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('volOut').innerHTML = list.map(function(v) {
      return '<div class="vol-card fade-in">'
        + '<div class="vol-card-tag">' + (v.category || 'Volunteer') + '</div>'
        + '<div class="vol-card-title">' + v.title + '</div>'
        + '<div class="vol-card-org">' + (v.organisation || '') + '</div>'
        + '<div class="vol-card-desc">' + (v.description || '') + '</div>'
        + (v.date ? '<div class="vol-card-date">' + v.date + '</div>' : '')
        + (v.coverImage ? '<img class="vol-card-img" src="' + v.coverImage + '" alt="' + v.title + '"/>' : '')
        + ((v.images && v.images.length) ? '<div class="vol-img-grid">' + v.images.map(function(src) {
            return '<img src="' + src + '" onclick="openLB(\'' + src + '\')" alt="photo"/>';
          }).join('') + '</div>' : '')
        + '</div>';
    }).join('');
    reObserve();
  });
});
</script>
</body>
</html>
